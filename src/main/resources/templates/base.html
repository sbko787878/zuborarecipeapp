<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../static/css/reset.css" th:href="@{/css/reset.css}">
	<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="../static/css/swiper-bundle.min.css" th:href="@{/css/swiper-bundle.min.css}">
	<link rel="stylesheet" href="../static/css/style.css" th:href="@{/css/style.css}">
	<script src="../static/js/swiper-bundle.min.js" th:src="@{/js/swiper-bundle.min.js}"></script>
	<title>レシピ一覧</title>
</head>


<body>
	<div id="splash">
		<h1 class="splash-title">HP5で出来る<br>レンチンごはん</h1>
	</div>

	<div class="search-navigation">
		<form th:action="@{/search}" method="get" id="searchForm">

			<div class="category-grid">
				<label class="cat-label"
					th:each="id, stat : ${#strings.arraySplit('①,②,③,④,⑤', ',')}">
					<input type="radio" name="category" th:value="${stat.count}" class="cat-radio"
						onchange="filterIcons(this.value)">

					<span class="cat-btn">
						<img th:src="@{'/data/icon/' + ${id} + '.png'}" th:alt="${id}"
							style="width: 50px; height: 50px; display: block;">
					</span>
				</label>
			</div>

			<div id="materialWrapper" style="display: none; margin-top: 15px;">
				<p style="font-size: 0.8rem; color: #666;">材料を選んでチェックをタップ！</p>
				<div class="material-grid">
					<label th:each="icon : ${session.allIconList}" class="icon-checkbox-label" style="display: none;">
						<input type="checkbox" name="iconNames" th:value="${icon.iconName}" class="hidden-checkbox"
							onchange="updateRecipeFilter()">
						<div class="icon-content">
							<img th:src="@{'/data/icon/' + ${icon.iconPath}}" class="selectable-icon">
							<span class="icon-name" th:text="${icon.iconName}"></span>
						</div>
					</label>
				</div>
			</div>

			<div class="search-actions" style="display:none;">
				<button type="submit" class="action-btn-check">✔</button>
			</div>
		</form>
	</div>

	<div class="swiper mySwiper">
		<div class="swiper-wrapper">

			<!-- レシピをループ -->
			<div class="swiper-slide" th:each="recipe : ${session.allRecipeList}"
				th:attr="data-category=${recipe.category}, data-icons=${recipe.material}">
				<div class="recipe-card">
					<!-- レシピ画像をタップしたら詳細へ -->
					<a th:href="@{'/recipeList/' + ${recipe.id}}">
						<img th:src="@{'/data/image/'+${recipe.imagePath}}" class="recipe-image" alt="レシピ画像">
					</a>
					<div class="recipe-iconList">
						<img th:each="icon : ${recipe.iconList}" th:src="@{'/data/icon/'+${icon.iconPath}}"
							th:title="${icon.iconName}" th:alt="${icon.iconName}" class="recipe-icon">

					</div>
					<!-- レシピ名 -->
					<!-- <h2 class="recipe-title" th:text="${recipe.name}"> -->
					<h2 class="recipe-title" th:utext="${recipe.name}">
						<!-- <h1 th:utext="${recipe.formattedTitle}"></h1> -->
						期間限定TEA
					</h2>
				</div>
			</div>
		</div>
		<div class="swiper-pagination"></div>
	</div>
	<script>
		var swiper = new Swiper(".mySwiper", {
			direction: "vertical",
			slidesPerView: 1,
			spaceBetween: 30,
			// mousewheel: true,
			pagination: {
				el: ".swiper-pagination",
				clickable: true,
			},
		});
		//          navigator:{
		//             nextEl: '.swiper-button-next',
		//             prevEl: '.swiper-button-prev',
		//         },
		// });

		let currentCategory = ""; // 現在選ばれている大分類を保持

		// 1. 大分類ボタンを押した時
		function filterIcons(selectedCategory) {
			currentCategory = selectedCategory;

			// 全ての材料チェックボックスをリセット（大分類を切り替えた時は全表示からスタートするため）
			const checkboxes = document.querySelectorAll('.hidden-checkbox');
			checkboxes.forEach(cb => cb.checked = false);

			const wrapper = document.getElementById('materialWrapper');
			wrapper.style.display = 'block';

			const slides = document.querySelectorAll('.swiper-slide');
			const iconLabels = document.querySelectorAll('.icon-checkbox-label');
			let activeMaterialsInCat = "";

			// そのカテゴリーに属するレシピの材料を収集
			slides.forEach(slide => {
				if (slide.getAttribute('data-category') === currentCategory) {
					activeMaterialsInCat += slide.getAttribute('data-icons') + " ";
				}
			});

			// 使える材料アイコンだけを表示
			iconLabels.forEach(label => {
				const iconName = label.querySelector('input').value;
				if (activeMaterialsInCat.includes(iconName)) {
					label.style.setProperty("display", "inline-block", "important");
				} else {
					label.style.display = 'none';
				}
			});

			// レシピ表示を更新（大分類のみの状態で全レシピを表示）
			updateRecipeFilter();
		}

		// 2. 材料アイコンをチェック/解除した時、および大分類切り替え時に呼ばれる
		function updateRecipeFilter() {
			const slides = document.querySelectorAll('.swiper-slide');

			// 現在チェックされている材料の名前を取得
			const checkedCheckboxes = document.querySelectorAll('.hidden-checkbox:checked');
			const selectedMaterialNames = Array.from(checkedCheckboxes).map(cb => cb.value);

			slides.forEach(slide => {
				const recipeCat = slide.getAttribute('data-category');
				const recipeMaterials = slide.getAttribute('data-icons');

				// 条件A: 大分類が一致しているか
				const categoryMatch = (recipeCat === currentCategory);

				// 条件B: 選択した全ての材料がレシピに含まれているか (AND検索)
				// もし1つもチェックしていなければ常にtrue（その大分類の全レシピを出す）
				const materialMatch = selectedMaterialNames.every(name => recipeMaterials.includes(name));

				if (categoryMatch && materialMatch) {
					slide.style.display = 'block';
				} else {
					slide.style.display = 'none';
				}
			});

			// Swiperの表示を更新して最初のスライドに戻す
			if (typeof swiper !== 'undefined') {
				swiper.update();
				swiper.slideTo(0);
			}
		}
	</script>
</body>

</html>
