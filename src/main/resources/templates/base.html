<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../static/css/reset.css" th:href="@{/css/reset.css}">
	<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="../static/css/swiper-bundle.min.css" th:href="@{/css/swiper-bundle.min.css}">
	<link rel="stylesheet" href="../static/css/style.css" th:href="@{/css/style.css}">
	<script src="../static/js/swiper-bundle.min.js" th:src="@{/js/swiper-bundle.min.js}"></script>
	<title>レシピ一覧</title>
</head>


<body>
	<div id="splash">
		<h1 class="splash-title">HP5で出来る<br>レンチンごはん</h1>
	</div>

	<div class="search-navigation">
		<form th:action="@{/search}" method="get" id="searchForm">
			<div class="category-grid">
				<label class="cat-label" th:each="id, stat : ${#strings.arraySplit('①,②,③,④,⑤', ',')}">
					<input type="radio" name="category" th:value="${stat.count}" class="cat-radio"
						onclick="filterIcons(this.value)">
					<span class="cat-btn">
						<img th:src="@{'/data/icon/' + ${id} + '.png'}" th:alt="${id}">
					</span>
				</label>
			</div>

			<div id="materialWrapper" style="display: none; margin-top: 10px;">
				<div class="middle-category-selector"
					style="display: flex; justify-content: center; gap: 10px; margin-bottom: 10px;">
					<label class="mid-cat-label">
						<input type="radio" name="mid_category" value="1" class="mid-cat-radio" checked
							onclick="changeMiddleCategory(1, this)">
						<span class="mid-cat-btn">
							<img th:src="@{/data/icon/mid_meat.png}" alt="肉魚">
							<small>肉/魚</small>
						</span>
					</label>

					<label class="mid-cat-label">
						<input type="radio" name="mid_category" value="2" class="mid-cat-radio"
							onclick="changeMiddleCategory(2, this)">
						<span class="mid-cat-btn">
							<img th:src="@{/data/icon/mid_vege.png}" alt="野菜">
							<small>野菜</small>
						</span>
					</label>

					<label class="mid-cat-label">
						<input type="radio" name="mid_category" value="3" class="mid-cat-radio"
							onclick="changeMiddleCategory(3, this)">
						<span class="mid-cat-btn">
							<img th:src="@{/data/icon/mid_other.png}" alt="その他">
							<small>その他</small>
						</span>
					</label>
				</div>

				<p style="font-size: 0.7rem; color: #666; text-align: center; margin-bottom: 5px;">材料を選んでチェック！</p>

				<div id="allIconsStorage" style="display: none;">
					<label th:each="icon : ${session.allIconList}" class="icon-checkbox-label"
						th:attr="data-mid=${icon.middleCategory}">
						<input type="checkbox" name="iconNames" th:value="${icon.iconName}" class="hidden-checkbox"
							onchange="updateRecipeFilter()">
						<div class="icon-content">
							<img th:src="@{'/data/icon/' + ${icon.iconPath}}" class="selectable-icon">
							<span class="icon-name" th:text="${icon.iconName}"></span>
						</div>
					</label>
				</div>

				<div class="swiper materialSwiper">
					<div class="swiper-wrapper" id="materialSlideContainer"></div>
				</div>
			</div>
		</form>
	</div>
	<div class="swiper mySwiper">
		<div class="swiper-wrapper">
			<div class="swiper-slide" th:each="recipe : ${session.allRecipeList}"
				th:attr="data-category=${recipe.category}, data-icons=${recipe.material}">
				<div class="recipe-card">
					<a th:href="@{'/recipeList/' + ${recipe.id}}">
						<img th:src="@{'/data/image/'+${recipe.imagePath}}" class="recipe-image" alt="レシピ画像">
					</a>
					<h2 class="recipe-title" th:utext="${recipe.name}">レシピ名</h2>
				</div>
			</div>
		</div>
		<div class="swiper-pagination"></div>
	</div>

	<script th:inline="javascript">
		var swiper = new Swiper(".mySwiper", {
			direction: "vertical",
			slidesPerView: 1,
			spaceBetween: 30,
			pagination: {el: ".swiper-pagination", clickable: true},
		});

		let materialSwiper; // 中分類スライド用
		let currentMidNum = 1; // 初期表示は「1:肉/魚」
		let currentCategory = ""; // ここには常に「丸数字（①など）」を保持するようにします

		function updateRecipeFilter() {
			const slides = document.querySelectorAll('.swiper-slide');
			const checkedCheckboxes = document.querySelectorAll('.hidden-checkbox:checked');
			const selectedMaterialNames = Array.from(checkedCheckboxes).map(cb => cb.value.trim());


			let reachableMaterials = ""; // デッドエンド防止用：現在表示中のレシピに含まれる材料

			slides.forEach(slide => {
				const recipeCat = (slide.getAttribute('data-category') || "").trim();
				const recipeMaterials = (slide.getAttribute('data-icons') || "");

				const categoryMatch = (currentCategory === "" || recipeCat === currentCategory);
				const materialMatch = selectedMaterialNames.every(name => recipeMaterials.includes(name));

				if (categoryMatch && materialMatch) {
					slide.style.display = 'block';
					reachableMaterials += " " + recipeMaterials + " ";
				} else {
					slide.style.display = 'none';
				}
			});

			if (swiper) {
				swiper.update();
				swiper.slideTo(0);
			}

			// ★修正：これまでのアイコン表示切り替えコードを削除し、以下の関数呼び出しに置き換える
			renderMaterialSwiper();
		}

		function filterIcons(selectedCategory) {
			// 1. 半角数字を丸数字に変換するマップ
			const circleMap = {"1": "①", "2": "②", "3": "③", "4": "④", "5": "⑤"};
			const inputVal = selectedCategory.toString();
			const circleVal = circleMap[inputVal] || inputVal;

			// --- 2. リセット判定 ---
			if (currentCategory === circleVal) {
				currentCategory = "";

				// 大分類ラジオボタンの選択解除
				document.querySelectorAll('.cat-radio').forEach(radio => radio.checked = false);

				// 【追加】材料チェックボックスのチェックもすべて外す
				document.querySelectorAll('.hidden-checkbox').forEach(cb => cb.checked = false);

				// 材料エリアを隠す
				const wrapper = document.getElementById('materialWrapper');
				if (wrapper) wrapper.style.display = 'none';

				console.log("カテゴリーと材料の選択をすべてリセットしました");
				updateRecipeFilter(); // これでレシピ表示が全件に戻ります
				return;
			}

			// 3. 新規選択
			currentCategory = circleVal;
			console.log("① 検索開始 カテゴリー:", currentCategory);

			const wrapper = document.getElementById('materialWrapper');
			if (wrapper) wrapper.style.display = 'block';

			// 材料チェックをリセット
			document.querySelectorAll('.hidden-checkbox').forEach(cb => cb.checked = false);

			updateRecipeFilter();
		}

		// ★新規追加：中分類ボタン（肉/魚など）が押された時の処理
		function changeMiddleCategory(midNum, radioElement) {
			currentMidNum = midNum;

			// ラジオボタンを使っているので、クラスの付け替え（btn.classList.remove('active')）は不要になる。
			// CSSの :checked セレクタが自動的に見た目を変えてくれるため。

			renderMaterialSwiper();
		}

		// ★新規追加：条件に合うアイコンだけを Swiper の中に集めて表示する処理
		function renderMaterialSwiper() {
			const container = document.getElementById('materialSlideContainer');
			const storage = document.getElementById('allIconsStorage'); // 待機場所を取得
			if (!container || !storage) return;

			// 1. スライド内に残っているアイコンをすべて「待機場所」へ避難させる
			const currentIcons = container.querySelectorAll('.icon-checkbox-label');
			currentIcons.forEach(icon => storage.appendChild(icon));

			// スライドの「枠（swiper-slide）」だけをクリア
			container.innerHTML = '';

			// 2. 現在表示されているレシピに含まれる材料を特定
			let reachableMaterials = "";
			document.querySelectorAll('.swiper-slide[data-category]').forEach(slide => {
				if (slide.style.display !== 'none') {
					reachableMaterials += " " + (slide.getAttribute('data-icons') || "") + " ";
				}
			});

			// 3. 待機場所にある全ラベルから、条件に合うものだけをスライドへ移動
			const allLabels = storage.querySelectorAll('.icon-checkbox-label');

			allLabels.forEach(label => {
				const mid = parseInt(label.getAttribute('data-mid'));
				const name = label.querySelector('input').value.trim();
				const isChecked = label.querySelector('input').checked;

				// 現在の中分類かつ、(表示レシピに含まれる OR すでにチェック済み)
				if (mid === currentMidNum) {
					if (isChecked || reachableMaterials.includes(name)) {
						const slideDiv = document.createElement('div');
						slideDiv.className = 'swiper-slide';
						slideDiv.style.width = 'auto';
						slideDiv.appendChild(label); // 移動（これでstorageからは自動的に消える）
						container.appendChild(slideDiv);
						label.style.display = 'inline-block';
					}
				}
			});

			// 4. Swiperの初期化または更新
			if (!materialSwiper) {
				materialSwiper = new Swiper(".materialSwiper", {
					slidesPerView: "auto",
					spaceBetween: 10,
					freeMode: true
				});
			} else {
				materialSwiper.update();
				materialSwiper.slideTo(0);
			}
		}
	</script>
</body>

</html>
