spring.application.name=zuborarecipeapp

# 1. DBへの接続設定 (IPアドレスはVirtualBoxの設定)
spring.datasource.url=jdbc:mysql://localhost:3306/zubora_recipes
spring.datasource.username=user
spring.datasource.password=111111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. MyBatisの設定 (XMLの場所を指定)
mybatis.mapper-locations=classpath:com/example/zuborarecipeapp/repository/RecipeMapper.xml
# Entityのパッケージ名を登録しておくとXMLで型名が短く書けます
mybatis.type-aliases-package=com.example.zuborarecipeapp.entity

# 3. (任意) SQLをコンソールに出力してデバッグしやすくする
logging.level.com.example.zuborarecipeapp.repository=DEBUG