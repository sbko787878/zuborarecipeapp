<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/reset .css" th:href="@{/css/reset.css}">
    <link rel="stylesheet" href="../static/css/swiper-bundle.min.css" th:href="@{/css/swiper-bundle.min.css}">
    <link rel="stylesheet" href="../static/css/style.css" th:href="@{/css/style.css}">
    <script src="../static/js/swiper-bundle.min.js" th:src="@{/js/swiper-bundle.min.js}"></script>
    <title>レシピ一覧</title>
</head>


<body>
    <div class="swipe">
        <!-- レシピをループ -->
        <div class="swipe" th:each="recipe : ${recipeList}">
            <div class="recipe-card">
                <!-- レシピ画像をタップしたら詳細へ -->
                <a href="tea.jpg" th:href="@{'/recipeList/' + ${recipe.name}}">

                    <img src="tea.jpg" th:src="${recipe.imagePath}" class="recipe-image">
                </a>
                <!-- レシピ画像 -->
                <!-- <img th:src="${recipe.imagePath}" class="recipe-image"> -->
                <!-- レシピ名 -->
                <h2 class="recipe-title" th:text="${recipe.name}">
                    期間限定TEA
                </h2>

            </div>
        </div>
    </div>
    <script>
        var swiper = new Swiper(".mySwiper", {
      direction: "vertical",
      slidesPerView: 1,
      spaceBetween: 30,
      mousewheel: true,
      pagination: {
        el: ".swiper-pagination",
        clickable: true,
      },
    });
//          navigator:{
//             nextEl: '.swiper-button-next',
//             prevEl: '.swiper-button-prev',
//         },
// });
    </script>
</body>

</html>
