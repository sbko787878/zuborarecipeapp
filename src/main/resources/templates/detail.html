<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <title>レシピ詳細</title>
</head>

<body>
<div class="detail-container">
    <div class="recipe-card">

        <!-- 画像 -->
        <img th:src="@{${detailRecipe.imagePath}}" class="recipe-image">

        <!-- タイトル -->
        <h2 class="recipe-title" th:text="${detailRecipe.name}"></h2>

        <!-- 材料 -->
        <h3 class="material-title" th:text="${detailRecipe.material}"></h3>

       <!-- 作り方 -->
        <h3 class="section-title" th:text="${detailRecipe.description}"></h3>

        <!-- 戻るボタン -->
        <div class="back-btn-area">
            <a th:href="@{/}" class="back-btn">戻る</a>
        </div>

    </div>

</div>
</body>
</html>
