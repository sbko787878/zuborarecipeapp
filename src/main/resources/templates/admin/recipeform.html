<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レシピ編集</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f5f5f5;
            padding: 40px;
        }

        .container {
            width: 600px;
            margin: 0 auto;
            background: white;
            padding: 25px 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            height: 100px;
        }

        .btn-area {
            text-align: center;
            margin-top: 25px;
        }

        button {
            background: #4CAF50;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #555;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1 th:text="${recipe.id == null} ? '新規レシピ登録' : 'レシピ編集'"></h1>

        <form th:action="@{/admin/recipes/save}" method="post">

            <input type="hidden" name="id" th:value="${recipe.id}">

            <label>名前</label>
            <input type="text" name="name" th:value="${recipe.name}">

            <label>説明</label>
            <textarea name="description" th:text="${recipe.description}"></textarea>

            <label>材料</label>
            <textarea name="material" th:text="${recipe.material}"></textarea>

            <label>画像パス</label>
            <input type="text" name="imagePath" th:value="${recipe.imagePath}">

            <label>カテゴリ</label>
            <input type="text" name="category" th:value="${recipe.category}">

            <div class="btn-area">
                <button type="submit">保存</button>
            </div>

        </form>

        <a class="back-link" th:href="@{/admin/recipes}">← 一覧に戻る</a>

    </div>

</body>

</html>
